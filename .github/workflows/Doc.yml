name: Docker-Actions

on:
   workflow_dispatch:
  #  push:
  #       branches: [main]
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Docker Login
              uses: docker/login-action@v3
              with:
                username: ${{vars.DOCKER_USERNAME}}
                password: ${{secrets.DOCKER_PASSWORD}}
            # - name: Docker Build
            #   uses: docker/build-push-action@v5
            #   with:
            #     context: .
            #     push: true
            #     tags: ${{vars.DOCKER_USERNAME}}/python:latest

    run-pull:
        concurrency:
          group: production
          cancel-in-progress: true
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - uses: whoan/docker-build-with-cache-action@v5
              with:
                username: ${{vars.DOCKER_USERNAME}}
                password: "${{ secrets.DOCKER_PASSWORD }}"
                image_name: python
                image_tag: v1
    
    Run:
        needs: run-pull
        runs-on: ubuntu-latest
        steps:
            - name: Run Docker File
              uses: addnab/docker-run-action@v3
              with:
                image: python:latest
          


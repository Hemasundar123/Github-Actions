name: Test

on:
    push:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Run Command
              run: |
                echo "Hello"
                echo "My name is Mikey"
                ls -la
                cat README.md
            - name: Install Dependencies
              run: |
                sudo apt-get update
                sudo apt-get install cowsay -y
                echo "Mikey" >> Mikey.txt
                cat Mikey.txt
            - name: Upload File
              uses: actions/upload-artifact@v4
              with:
                name: Mikey
                path: Mikey.txt  

    test:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Run Command
              run: |
                echo "Hello"
                echo "My name is Mikey"
                ls -la
                cat README.md
            - name: Download File
              uses: actions/download-artifact@v4
              with:
                name: Mikey
        
